{% extends "base.html" %}

{% block content %}

<h2 style="color: black;">Users</h2>


{% for data in data %}



<div class="card" style="width: 18rem;">
    <div class="card-body">
      <h5 class="card-title"><a style="color: black; "  href="{% url "profile"  data.phone %}"> {{data.name|title }}</a></h5>
      <h6 class="card-subtitle mb-2 text-muted">Add as Friend</h6>
    </div>
  </div>
{% empty %}
    <p style="color: black">No Users found  </p>

{% endfor %}

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Landing Page{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <style>
        body{
            margin: 0;
            padding: 0;
        }
        .header {
            padding: 10px;
            background: #b81132;
            color: #fff;
        }

    </style>
</head>
<body>
<div class="header">
    <ul>
        <li class="logo" style="  font-family: Arial; display: block; font-size: 30px" ><a style=" text-decoration: none;
            color: white; padding: 10px" href="{% url 'home' %}">Social Site</a></li>

        {% if not user.is_authenticated %}
        <li style="display: inline; float:left;"><a style="display: block; padding:10px; text-decoration: none" href="{% url 'login' %}" >Login</a> </li>
        <li style="display: inline; float:left;"><a style="display: block; padding:10px; text-decoration: none" href="{% url 'signup' %}" >Signup</a> </li>
        {% else %}
        <li style="display: inline; float:left;"><a style="display: block; text-decoration: none;" href="{% url 'logout' %}">logout</a></li>
        {% endif %}
    </ul>

</div>
<div id="content" class="container">
    {% block content %}
    {% endblock %}
</div>
</body>
</html>
